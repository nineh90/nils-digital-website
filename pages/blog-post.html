<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Wird dynamisch per post.js überschrieben -->
  <title id="seo-title">Blog – Nils-Digital</title>
  <meta name="description" id="seo-description" content="Einblicke aus der Arbeit von Nils-Digital – Webentwicklung, KI-Automatisierung und digitale Projekte.">
  <meta name="robots" content="index, follow">

  <!-- Canonical (wird dynamisch gesetzt) -->
  <link rel="canonical" id="seo-canonical" href="">

  <!-- Open Graph -->
  <meta property="og:title" id="og-title" content="Blog – Nils-Digital">
  <meta property="og:description" id="og-description" content="Einblicke aus der Arbeit von Nils-Digital – Webentwicklung, KI-Automatisierung und digitale Projekte.">
  <meta property="og:image" id="og-image" content="https://nils-digital.de/assets/images/logo/logo.png">
  <meta property="og:url" id="og-url" content="https://nils-digital.de/pages/blog.html">
  <meta property="og:type" content="article">
  <meta property="og:locale" content="de_DE">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" id="tw-title" content="Blog – Nils-Digital">
  <meta name="twitter:description" id="tw-description" content="Einblicke aus der Arbeit von Nils-Digital – Webentwicklung, KI-Automatisierung und digitale Projekte.">
  <meta name="twitter:image" id="tw-image" content="https://nils-digital.de/assets/images/logo/logo.png">

  <!-- JSON-LD wird vom JS erzeugt -->
  <script id="jsonld" type="application/ld+json"></script>
  <link rel="stylesheet" href="../css/main.css">
  <!-- Favicon & App Icons -->
  <link rel="apple-touch-icon" sizes="57x57" href="/apple-icon-57x57.png">
  <link rel="apple-touch-icon" sizes="60x60" href="/apple-icon-60x60.png">
  <link rel="apple-touch-icon" sizes="72x72" href="/apple-icon-72x72.png">
  <link rel="apple-touch-icon" sizes="76x76" href="/apple-icon-76x76.png">
  <link rel="apple-touch-icon" sizes="114x114" href="/apple-icon-114x114.png">
  <link rel="apple-touch-icon" sizes="120x120" href="/apple-icon-120x120.png">
  <link rel="apple-touch-icon" sizes="144x144" href="/apple-icon-144x144.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/apple-icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/android-icon-192x192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="msapplication-TileColor" content="#ffffff">
  <meta name="msapplication-TileImage" content="/ms-icon-144x144.png">
  <meta name="theme-color" content="#0d1117">
</head>

<body>

<div id="header"></div>

<main class="post-page-wrap">

  <!-- Zurück-Link -->
  <div class="post-back">
    <a href="blog.html" class="post-back-link">← Zurück zum Blog</a>
  </div>

  <!-- Karten-Container -->
  <article class="post-card" id="blog-content">

    <!-- Hero-Bild (wird per JS gesetzt wenn vorhanden) -->
    <div class="post-hero-img-wrap" id="post-hero-wrap" style="display:none;">
      <img id="post-hero-img" class="post-hero-img" src="" alt="">
    </div>

    <!-- Post-Header -->
    <div class="post-card-header">
      <span id="post-category" class="category-badge"></span>
      <h1 id="post-title"></h1>
      <p class="blog-date" id="post-date"></p>
      <span id="product-badge" class="product-badge hidden"></span>
    </div>

    <!-- Produkt-Box -->
    <div id="product-box"></div>

    <!-- Post-Content -->
    <div class="post-card-body" id="post-body"></div>

    <!-- Trennlinie -->
    <hr class="post-divider">

    <!-- Zurück-Button unten -->
    <a href="blog.html" class="btn-sm post-back-btn">← Zurück zum Blog</a>

  </article>

</main>

<div id="footer"></div>

<script src="../js/include.js"></script>
<script src="../js/main.js"></script>
<script src="../js/post.js"></script>
</body>
</html>
